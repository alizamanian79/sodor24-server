# ==================== Jpa config Mysql ==================== #
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
debug=true
logging.level.org.springframework.boot.autoconfigure=DEBUG

# ==================== Zarinpal config ==================== #
zarinpal.server_host=https://sandbox.zarinpal.com
zarinpal.merchant_Id=7007f58a-3ec5-4ea6-a414-5849591ba0a7

# ==================== RabbitMQ config ==================== #
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}

# ==================== App config ==================== #
server.port=${SERVER_PORT}
app.server.host=${APP_SERVER_HOST}
app.client.host=${APP_CLIENT_HOST}

app.rabbitmq.exchange=sodor24-exchange
app.rabbitmq.queues.signature=signature-queue
app.rabbitmq.routing-keys.signature=signature-routing-key
app.rabbitmq.queues.contract=contract-queue
app.rabbitmq.routing-keys.contract=contract-routing-key